<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>① BUILDING PROCESS — TAAG mockup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Share+Tech+Mono&family=Shippori+Mincho+B1:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{
  background:#f5f3f0;
  font-family:'Share Tech Mono',monospace;
  color:rgba(50,45,40,.85);
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:8px;overflow:hidden;
}
.title{font-family:'Shippori Mincho B1',serif;font-size:13px;letter-spacing:.35em;opacity:.65}
.desc{font-size:11px;letter-spacing:.18em;opacity:.45}
.svgwrap{width:min(100%,920px);position:relative;cursor:pointer}
svg{width:100%;height:auto;display:block}
.replay{margin-top:6px;background:transparent;border:1px solid rgba(50,45,40,.35);padding:8px 22px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.28em;color:rgba(50,45,40,.6);cursor:pointer}
.replay:hover{background:rgba(50,45,40,.05);color:rgba(50,45,40,.85)}
.tolink{margin-top:4px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.28em;color:rgba(50,45,40,.5);text-decoration:none}
.tolink:hover{color:rgba(50,45,40,.85)}

.draw{stroke-dasharray:var(--len,600);stroke-dashoffset:var(--len,600);animation:drawIn 1.6s ease forwards}
@keyframes drawIn{to{stroke-dashoffset:0}}
.fadein{opacity:0;animation:fadeIn 1.2s ease forwards}
@keyframes fadeIn{to{opacity:1}}

.phase-label{
  font-family:'Montserrat',sans-serif;font-size:13px;letter-spacing:.35em;
  fill:rgba(50,45,40,.55);text-anchor:middle;opacity:0;
  animation:phasePulse 2s ease forwards;
}
@keyframes phasePulse{
  0%{opacity:0;transform:translateY(8px)}
  20%{opacity:.85;transform:translateY(0)}
  75%{opacity:.85}
  100%{opacity:0;transform:translateY(-4px)}
}

@keyframes lightOn{
  0%{fill:rgba(245,243,240,1)}
  100%{fill:rgba(255,228,160,.85)}
}
.win-light{animation:lightOn 1.6s ease forwards}

.p1{animation-delay:.2s}.p2{animation-delay:2.2s}.p3{animation-delay:4.2s}
.p4{animation-delay:6.2s}.p5{animation-delay:8.2s}

.t-foundation{animation-delay:.4s;--len:560}
.t-col1{animation-delay:2.4s;--len:230}
.t-col2{animation-delay:2.5s;--len:230}
.t-col3{animation-delay:2.6s;--len:230}
.t-slab1{animation-delay:4.4s;--len:220}
.t-slab2{animation-delay:4.5s;--len:220}
.t-slab3{animation-delay:4.6s;--len:220}
.t-roof{animation-delay:4.7s;--len:230}
.t-parapet{animation-delay:4.8s;--len:480}
.t-wall-l{animation-delay:6.4s;--len:230}
.t-wall-r{animation-delay:6.5s;--len:230}
.t-win{animation-delay:7.6s}
.t-light{animation-delay:9.0s}
</style>
</head>
<body>

<div class="title">① BUILDING PROCESS</div>
<div class="desc">基礎 → 構造 → 床版 → ファサード → 灯る</div>

<div class="svgwrap" onclick="replay()">
<svg id="svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid meet">

  <!-- フェーズ・キャプション -->
  <text class="phase-label p1" x="400" y="50">PHASE 01 — FOUNDATION</text>
  <text class="phase-label p2" x="400" y="50">PHASE 02 — STRUCTURE</text>
  <text class="phase-label p3" x="400" y="50">PHASE 03 — FLOOR SLABS</text>
  <text class="phase-label p4" x="400" y="50">PHASE 04 — FACADE</text>
  <text class="phase-label p5" x="400" y="50">— A WORKPLACE AWAKENS —</text>

  <!-- 地面（GL） -->
  <line x1="40" y1="380" x2="760" y2="380" stroke="rgba(50,45,40,.45)" stroke-width="1.4"
        class="draw" style="animation-delay:.1s;--len:730"/>
  <text x="48" y="375" style="font-size:7px;fill:rgba(50,45,40,.4);letter-spacing:.1em" class="fadein" style="animation-delay:.2s">▼GL</text>

  <!-- ① 基礎 -->
  <rect x="280" y="368" width="240" height="14" fill="rgba(50,45,40,.08)"
        class="fadein" style="animation-delay:.5s"/>
  <line x1="280" y1="368" x2="520" y2="368" stroke="rgba(50,45,40,.7)" stroke-width="1.2" class="draw t-foundation"/>
  <line x1="280" y1="382" x2="520" y2="382" stroke="rgba(50,45,40,.7)" stroke-width="1.2" class="draw t-foundation"/>
  <line x1="280" y1="368" x2="280" y2="382" stroke="rgba(50,45,40,.7)" stroke-width="1.2" class="draw t-foundation"/>
  <line x1="520" y1="368" x2="520" y2="382" stroke="rgba(50,45,40,.7)" stroke-width="1.2" class="draw t-foundation"/>
  <line x1="280" y1="398" x2="520" y2="398" stroke="rgba(50,45,40,.3)" stroke-width=".5" class="fadein" style="animation-delay:1.4s"/>
  <text x="400" y="412" text-anchor="middle"
        style="font-size:7px;fill:rgba(50,45,40,.4);letter-spacing:.05em"
        class="fadein" style="animation-delay:1.4s">9,200</text>

  <!-- ② STRUCTURE: 3本の柱（フルハイト） -->
  <line x1="290" y1="368" x2="290" y2="140" stroke="rgba(50,45,40,.7)" stroke-width="1.5" class="draw t-col1"/>
  <line x1="510" y1="368" x2="510" y2="140" stroke="rgba(50,45,40,.7)" stroke-width="1.5" class="draw t-col2"/>
  <line x1="400" y1="368" x2="400" y2="140" stroke="rgba(50,45,40,.45)" stroke-width="1" class="draw t-col3"/>

  <!-- ③ 床スラブ + 屋根スラブ + パラペット -->
  <line x1="290" y1="316" x2="510" y2="316" stroke="rgba(50,45,40,.55)" stroke-width="1" class="draw t-slab1"/>
  <line x1="290" y1="258" x2="510" y2="258" stroke="rgba(50,45,40,.55)" stroke-width="1" class="draw t-slab2"/>
  <line x1="290" y1="200" x2="510" y2="200" stroke="rgba(50,45,40,.55)" stroke-width="1" class="draw t-slab3"/>
  <line x1="285" y1="140" x2="515" y2="140" stroke="rgba(50,45,40,.85)" stroke-width="2" class="draw t-roof"/>
  <rect x="285" y="132" width="230" height="8" fill="none" stroke="rgba(50,45,40,.6)" stroke-width=".8" class="draw t-parapet"/>

  <!-- ④ FACADE: 外壁 -->
  <line x1="290" y1="140" x2="290" y2="368" stroke="rgba(50,45,40,.85)" stroke-width="2.2" class="draw t-wall-l"/>
  <line x1="510" y1="140" x2="510" y2="368" stroke="rgba(50,45,40,.85)" stroke-width="2.2" class="draw t-wall-r"/>

  <!-- 窓: 各階1本のストリップ窓（3階分） -->
  <rect x="304" y="158" width="202" height="34" fill="#f5f3f0" stroke="rgba(50,45,40,.7)" stroke-width="1" class="fadein t-win"/>
  <rect x="304" y="216" width="202" height="34" fill="#f5f3f0" stroke="rgba(50,45,40,.7)" stroke-width="1" class="fadein t-win"/>
  <rect x="304" y="274" width="202" height="34" fill="#f5f3f0" stroke="rgba(50,45,40,.7)" stroke-width="1" class="fadein t-win"/>
  <!-- F1 (ground): エントランス（ガラス + 自動ドア + キャノピー） -->
  <rect x="298" y="324" width="92" height="42" fill="rgba(50,45,40,.04)" stroke="rgba(50,45,40,.7)" stroke-width="1" class="fadein t-win"/>
  <rect x="410" y="324" width="92" height="42" fill="rgba(50,45,40,.04)" stroke="rgba(50,45,40,.7)" stroke-width="1" class="fadein t-win"/>
  <line x1="450" y1="324" x2="450" y2="366" stroke="rgba(50,45,40,.6)" stroke-width=".9" class="fadein t-win"/>
  <line x1="470" y1="324" x2="470" y2="366" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein t-win"/>
  <line x1="430" y1="318" x2="490" y2="318" stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="fadein t-win"/>
  <line x1="430" y1="318" x2="430" y2="324" stroke="rgba(50,45,40,.5)" stroke-width=".7" class="fadein t-win"/>
  <line x1="490" y1="318" x2="490" y2="324" stroke="rgba(50,45,40,.5)" stroke-width=".7" class="fadein t-win"/>

  <!-- ⑤ LIGHTS ON -->
  <rect x="304" y="158" width="202" height="34" fill="#f5f3f0" class="win-light t-light"/>
  <rect x="304" y="216" width="202" height="34" fill="#f5f3f0" class="win-light t-light"/>
  <rect x="304" y="274" width="202" height="34" fill="#f5f3f0" class="win-light t-light"/>
  <ellipse cx="405" cy="175" rx="125" ry="32" fill="rgba(255,228,160,.18)" class="fadein t-light"/>
  <ellipse cx="405" cy="233" rx="125" ry="32" fill="rgba(255,228,160,.16)" class="fadein t-light"/>
  <ellipse cx="405" cy="291" rx="125" ry="32" fill="rgba(255,228,160,.14)" class="fadein t-light"/>

  <!-- 武田菱 -->
  <g transform="translate(720,440)" fill="rgba(50,45,40,.7)" class="fadein" style="animation-delay:9.4s">
    <polygon points="0,-8 6,-4 0,0 -6,-4"/>
    <polygon points="0,1 6,5 0,9 -6,5"/>
    <polygon points="-1,0 -7,-4 -13,0 -7,4"/>
    <polygon points="1,0 7,-4 13,0 7,4"/>
  </g>
  <text x="700" y="465"
        style="font-size:7px;fill:rgba(50,45,40,.6);letter-spacing:.3em;font-family:'Shippori Mincho B1',serif"
        class="fadein" style="animation-delay:9.6s">TAKEDA</text>
</svg>
</div>

<button class="replay" onclick="replay()">↻ REPLAY</button>
<a href="mockup_entrance_variants.html" class="tolink">← BACK TO INDEX</a>

<script>
function replay(){
  const svg=document.getElementById('svg');
  const clone=svg.cloneNode(true);
  svg.parentNode.replaceChild(clone,svg);
}
</script>
</body>
</html>
