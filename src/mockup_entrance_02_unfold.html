<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>② PLAN → ELEVATION → AXONOMETRIC — TAAG mockup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Share+Tech+Mono&family=Shippori+Mincho+B1:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{
  background:#f5f3f0;
  font-family:'Share Tech Mono',monospace;
  color:rgba(50,45,40,.85);
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:8px;overflow:hidden;
}
.title{font-family:'Shippori Mincho B1',serif;font-size:13px;letter-spacing:.35em;opacity:.65}
.desc{font-size:11px;letter-spacing:.18em;opacity:.45}
.svgwrap{width:min(100%,920px);position:relative;cursor:pointer}
svg{width:100%;height:auto;display:block}
.replay{margin-top:6px;background:transparent;border:1px solid rgba(50,45,40,.35);padding:8px 22px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.28em;color:rgba(50,45,40,.6);cursor:pointer}
.replay:hover{background:rgba(50,45,40,.05);color:rgba(50,45,40,.85)}
.tolink{margin-top:4px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.28em;color:rgba(50,45,40,.5);text-decoration:none}
.tolink:hover{color:rgba(50,45,40,.85)}

.draw{stroke-dasharray:var(--len,400);stroke-dashoffset:var(--len,400);animation:drawIn 1.4s ease forwards}
@keyframes drawIn{to{stroke-dashoffset:0}}

.phase-label{
  font-family:'Montserrat',sans-serif;font-size:13px;letter-spacing:.35em;
  fill:rgba(50,45,40,.55);text-anchor:middle;opacity:0;
  animation:phasePulse 3s ease forwards;
}
@keyframes phasePulse{
  0%{opacity:0}10%{opacity:.8}90%{opacity:.8}100%{opacity:0}
}
.label1{animation-delay:.2s}
.label2{animation-delay:3.4s}
.label3{animation-delay:6.6s}

#planGroup{
  opacity:0;
  animation: phaseShow 3.2s ease forwards;
  animation-delay:.4s;
  transform-origin:400px 240px;
}
@keyframes phaseShow{
  0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0;transform:scale(.7) translate(-180px,0)}
}
#planGroup .draw{animation-delay:.5s}
#planGroup .draw.d2{animation-delay:.7s}
#planGroup .draw.d3{animation-delay:.9s}
#planGroup .draw.d4{animation-delay:1.1s}
#planGroup .draw.d5{animation-delay:1.3s}
#planGroup .fadein{opacity:0;animation:fadeIn 1s ease forwards;animation-delay:1.5s}

@keyframes fadeIn{to{opacity:1}}
@keyframes fadeOnly{0%{opacity:0}10%{opacity:1}100%{opacity:1}}

#elevGroup{
  opacity:0;
  animation: phaseShow2 3.2s ease forwards;
  animation-delay:3.6s;
  transform-origin:400px 240px;
}
@keyframes phaseShow2{
  0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0;transform:scale(.7) translate(180px,0)}
}
#elevGroup .draw{animation-delay:3.8s;animation-duration:1.2s}
#elevGroup .draw.d2{animation-delay:4.0s}
#elevGroup .draw.d3{animation-delay:4.2s}
#elevGroup .draw.d4{animation-delay:4.4s}
#elevGroup .draw.d5{animation-delay:4.6s}
#elevGroup .draw.d6{animation-delay:4.8s}

#axonGroup{
  opacity:0;
  animation: fadeOnly 3s ease forwards;
  animation-delay:6.8s;
}
#axonGroup .draw{animation-delay:7.0s;animation-duration:1.2s}
#axonGroup .draw.d2{animation-delay:7.2s}
#axonGroup .draw.d3{animation-delay:7.4s}
#axonGroup .draw.d4{animation-delay:7.6s}
#axonGroup .draw.d5{animation-delay:7.8s}
#axonGroup .draw.d6{animation-delay:8.0s}
#axonGroup .draw.d7{animation-delay:8.2s}
</style>
</head>
<body>

<div class="title">② PLAN → ELEVATION → AXONOMETRIC</div>
<div class="desc">2Dの図面が、立面に展開し、3Dのオフィスビルになる</div>

<div class="svgwrap" onclick="replay()">
<svg id="svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid meet">

  <!-- フェーズ・キャプション -->
  <text class="phase-label label1" x="400" y="50">PLAN</text>
  <text class="phase-label label2" x="400" y="50">ELEVATION</text>
  <text class="phase-label label3" x="400" y="50">AXONOMETRIC</text>

  <!-- ===== ① PLAN（オフィス基準階平面図） ===== -->
  <g id="planGroup">
    <!-- 外壁 -->
    <line x1="280" y1="140" x2="520" y2="140" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw" style="--len:240"/>
    <line x1="520" y1="140" x2="520" y2="340" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw d2" style="--len:200"/>
    <line x1="520" y1="340" x2="280" y2="340" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw d3" style="--len:240"/>
    <line x1="280" y1="340" x2="280" y2="140" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw d4" style="--len:200"/>
    <!-- 内壁 -->
    <line x1="430" y1="140" x2="430" y2="240" stroke="rgba(50,45,40,.55)" stroke-width="1" class="draw d4" style="--len:100"/>
    <line x1="280" y1="240" x2="460" y2="240" stroke="rgba(50,45,40,.55)" stroke-width="1" class="draw d5" style="--len:180"/>
    <!-- エントランス引き戸（円弧）-->
    <path d="M 460,240 A 30,30 0 0 1 490,210" fill="none" stroke="rgba(50,45,40,.45)" stroke-width=".8" class="draw d5" style="--len:50"/>
    <line x1="460" y1="240" x2="460" y2="210" stroke="rgba(50,45,40,.45)" stroke-width=".8" class="draw d5" style="--len:30"/>
    <!-- カーテンウォール開口（北側全面）-->
    <line x1="305" y1="138" x2="405" y2="138" stroke="rgba(50,45,40,.5)" stroke-width=".6" stroke-dasharray="3 2" class="draw d4" style="--len:100"/>
    <line x1="305" y1="142" x2="405" y2="142" stroke="rgba(50,45,40,.5)" stroke-width=".6" stroke-dasharray="3 2" class="draw d4" style="--len:100"/>
    <line x1="305" y1="140" x2="405" y2="140" stroke="#f5f3f0" stroke-width="3" class="draw d2" style="--len:100"/>
    <!-- 寸法 -->
    <line x1="280" y1="120" x2="520" y2="120" stroke="rgba(50,45,40,.3)" stroke-width=".5" class="draw d5" style="--len:240"/>
    <text x="400" y="115" text-anchor="middle" style="font-size:8px;fill:rgba(50,45,40,.45);letter-spacing:.05em">9,200</text>
    <!-- ラベル -->
    <text x="355" y="195" text-anchor="middle" style="font-size:8px;fill:rgba(50,45,40,.5);letter-spacing:.12em">OPEN OFFICE</text>
    <text x="475" y="195" text-anchor="middle" style="font-size:8px;fill:rgba(50,45,40,.5);letter-spacing:.12em">MTG</text>
    <text x="400" y="295" text-anchor="middle" style="font-size:8px;fill:rgba(50,45,40,.5);letter-spacing:.12em">ENTRY HALL</text>
    <!-- デスク群 -->
    <rect x="305" y="155" width="22" height="14" fill="none" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein"/>
    <rect x="335" y="155" width="22" height="14" fill="none" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein"/>
    <rect x="365" y="155" width="22" height="14" fill="none" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein"/>
    <rect x="305" y="205" width="22" height="14" fill="none" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein"/>
    <rect x="335" y="205" width="22" height="14" fill="none" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein"/>
    <rect x="365" y="205" width="22" height="14" fill="none" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein"/>
    <!-- 会議テーブル -->
    <ellipse cx="475" cy="195" rx="20" ry="11" fill="none" stroke="rgba(50,45,40,.4)" stroke-width=".5" class="fadein"/>
    <!-- 受付カウンター -->
    <rect x="295" y="280" width="100" height="6" fill="rgba(50,45,40,.18)" stroke="rgba(50,45,40,.5)" stroke-width=".5" class="fadein"/>
  </g>

  <!-- ===== ② ELEVATION（オフィス立面図、フラット屋根・4層） ===== -->
  <g id="elevGroup">
    <!-- 地面 -->
    <line x1="240" y1="360" x2="560" y2="360" stroke="rgba(50,45,40,.45)" stroke-width="1" class="draw" style="--len:320"/>
    <!-- 外形（フラット屋根） -->
    <line x1="300" y1="360" x2="300" y2="135" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw d2" style="--len:225"/>
    <line x1="300" y1="135" x2="500" y2="135" stroke="rgba(50,45,40,.85)" stroke-width="2.2" class="draw d3" style="--len:200"/>
    <line x1="500" y1="135" x2="500" y2="360" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw d4" style="--len:225"/>
    <line x1="300" y1="360" x2="500" y2="360" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw d5" style="--len:200"/>
    <!-- パラペット -->
    <rect x="295" y="128" width="210" height="7" fill="none" stroke="rgba(50,45,40,.6)" stroke-width=".7" class="draw d3" style="--len:434"/>
    <!-- 床ライン -->
    <line x1="300" y1="190" x2="500" y2="190" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d6" style="--len:200"/>
    <line x1="300" y1="245" x2="500" y2="245" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d6" style="--len:200"/>
    <line x1="300" y1="300" x2="500" y2="300" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d6" style="--len:200"/>
    <!-- 窓: 各階1本のストリップ窓（3階分） -->
    <rect x="312" y="148" width="176" height="32" fill="none" stroke="rgba(50,45,40,.6)" stroke-width=".9" class="draw d6" style="--len:416"/>
    <rect x="312" y="203" width="176" height="32" fill="none" stroke="rgba(50,45,40,.6)" stroke-width=".9" class="draw d6" style="--len:416"/>
    <rect x="312" y="258" width="176" height="32" fill="none" stroke="rgba(50,45,40,.6)" stroke-width=".9" class="draw d6" style="--len:416"/>
    <!-- 1F エントランス -->
    <rect x="312" y="313" width="80" height="47" fill="rgba(50,45,40,.04)" stroke="rgba(50,45,40,.6)" stroke-width=".8" class="draw d6" style="--len:254"/>
    <rect x="408" y="313" width="80" height="47" fill="rgba(50,45,40,.04)" stroke="rgba(50,45,40,.6)" stroke-width=".8" class="draw d6" style="--len:254"/>
    <line x1="448" y1="313" x2="448" y2="360" stroke="rgba(50,45,40,.5)" stroke-width=".6" class="draw d6" style="--len:47"/>
    <!-- キャノピー -->
    <line x1="395" y1="306" x2="465" y2="306" stroke="rgba(50,45,40,.85)" stroke-width="1.8" class="draw d6" style="--len:70"/>
    <!-- 高さ寸法 -->
    <line x1="540" y1="135" x2="540" y2="360" stroke="rgba(50,45,40,.3)" stroke-width=".5" class="draw d6" style="--len:225"/>
    <text x="550" y="245" text-anchor="start" style="font-size:8px;fill:rgba(50,45,40,.45)">12,500</text>
  </g>

  <!-- ===== ③ AXONOMETRIC（オフィスボリューム） ===== -->
  <g id="axonGroup" transform="translate(0,30)">
    <!-- 床面 -->
    <line x1="320" y1="320" x2="450" y2="345" stroke="rgba(50,45,40,.7)" stroke-width="1.4" class="draw" style="--len:135"/>
    <line x1="450" y1="345" x2="560" y2="280" stroke="rgba(50,45,40,.7)" stroke-width="1.4" class="draw d2" style="--len:130"/>
    <line x1="560" y1="280" x2="430" y2="255" stroke="rgba(50,45,40,.7)" stroke-width="1.4" class="draw d3" style="--len:135"/>
    <line x1="430" y1="255" x2="320" y2="320" stroke="rgba(50,45,40,.7)" stroke-width="1.4" class="draw d4" style="--len:130"/>

    <!-- 立ち上がり（ofice height = 160） -->
    <line x1="320" y1="320" x2="320" y2="160" stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d4" style="--len:160"/>
    <line x1="450" y1="345" x2="450" y2="185" stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d5" style="--len:160"/>
    <line x1="560" y1="280" x2="560" y2="120" stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d5" style="--len:160"/>
    <line x1="430" y1="255" x2="430" y2="95"  stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d6" style="--len:160"/>

    <!-- 屋根面（フラット） -->
    <line x1="320" y1="160" x2="450" y2="185" stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d6" style="--len:135"/>
    <line x1="450" y1="185" x2="560" y2="120" stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d6" style="--len:130"/>
    <line x1="560" y1="120" x2="430" y2="95"  stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d7" style="--len:135"/>
    <line x1="430" y1="95"  x2="320" y2="160" stroke="rgba(50,45,40,.85)" stroke-width="1.6" class="draw d7" style="--len:130"/>

    <!-- 床ライン (front face: 4 floors → 3 division lines) -->
    <line x1="320" y1="200" x2="450" y2="225" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d7" style="--len:135"/>
    <line x1="320" y1="240" x2="450" y2="265" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d7" style="--len:135"/>
    <line x1="320" y1="280" x2="450" y2="305" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d7" style="--len:135"/>
    <!-- 床ライン (right face) -->
    <line x1="450" y1="225" x2="560" y2="160" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d7" style="--len:130"/>
    <line x1="450" y1="265" x2="560" y2="200" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d7" style="--len:130"/>
    <line x1="450" y1="305" x2="560" y2="240" stroke="rgba(50,45,40,.4)" stroke-width=".6" class="draw d7" style="--len:130"/>

    <!-- 面の塗り（淡い） -->
    <polygon points="320,320 450,345 450,185 320,160" fill="rgba(50,45,40,.04)" opacity="0"
             style="animation:fadeOnly 2s ease forwards;animation-delay:7.6s"/>

    <!-- 窓: 各階1本のストリップ窓（front面、灯ったオフィス） -->
    <polygon points="345,172 430,189 430,211 345,194" fill="rgba(255,228,160,.5)" stroke="rgba(50,45,40,.55)" stroke-width=".7" class="draw d7" style="--len:215"/>
    <polygon points="345,210 430,227 430,249 345,232" fill="rgba(255,228,160,.5)" stroke="rgba(50,45,40,.55)" stroke-width=".7" class="draw d7" style="--len:215"/>
    <polygon points="345,250 430,267 430,289 345,272" fill="rgba(255,228,160,.5)" stroke="rgba(50,45,40,.55)" stroke-width=".7" class="draw d7" style="--len:215"/>
    <!-- 1F エントランス（ガラス） -->
    <rect x="345" y="290" width="35" height="28" fill="rgba(50,45,40,.08)" stroke="rgba(50,45,40,.55)" stroke-width=".6" class="draw d7" style="--len:126"/>
    <rect x="395" y="298" width="35" height="28" fill="rgba(50,45,40,.08)" stroke="rgba(50,45,40,.55)" stroke-width=".6" class="draw d7" style="--len:126"/>

    <!-- ラベル -->
    <text x="400" y="395" text-anchor="middle" class="draw d7"
          style="font-size:8px;fill:rgba(50,45,40,.45);letter-spacing:.25em;font-family:'Montserrat',sans-serif">SCALE 1/200</text>
  </g>

  <!-- 武田菱 -->
  <g transform="translate(720,440)" fill="rgba(50,45,40,.7)" style="opacity:0;animation:fadeOnly 1.5s ease forwards;animation-delay:8.6s">
    <polygon points="0,-8 6,-4 0,0 -6,-4"/>
    <polygon points="0,1 6,5 0,9 -6,5"/>
    <polygon points="-1,0 -7,-4 -13,0 -7,4"/>
    <polygon points="1,0 7,-4 13,0 7,4"/>
  </g>
  <text x="700" y="465" style="font-size:7px;fill:rgba(50,45,40,.6);letter-spacing:.3em;font-family:'Shippori Mincho B1',serif;opacity:0;animation:fadeOnly 1.5s ease forwards;animation-delay:8.8s">TAKEDA</text>
</svg>
</div>

<button class="replay" onclick="replay()">↻ REPLAY</button>
<a href="mockup_entrance_variants.html" class="tolink">← BACK TO INDEX</a>

<script>
function replay(){
  const svg=document.getElementById('svg');
  const clone=svg.cloneNode(true);
  svg.parentNode.replaceChild(clone,svg);
}
</script>
</body>
</html>
