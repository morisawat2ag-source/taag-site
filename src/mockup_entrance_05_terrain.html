<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>⑤ FROM THE LAND — TAAG mockup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Share+Tech+Mono&family=Shippori+Mincho+B1:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{
  background:#f5f3f0;
  font-family:'Share Tech Mono',monospace;
  color:rgba(50,45,40,.85);
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:8px;overflow:hidden;
}
.title{font-family:'Shippori Mincho B1',serif;font-size:13px;letter-spacing:.35em;opacity:.65}
.desc{font-size:11px;letter-spacing:.18em;opacity:.45}
.svgwrap{width:min(100%,920px);position:relative;cursor:pointer}
svg{width:100%;height:auto;display:block}
.replay{margin-top:6px;background:transparent;border:1px solid rgba(50,45,40,.35);padding:8px 22px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.28em;color:rgba(50,45,40,.6);cursor:pointer}
.replay:hover{background:rgba(50,45,40,.05);color:rgba(50,45,40,.85)}
.tolink{margin-top:4px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.28em;color:rgba(50,45,40,.5);text-decoration:none}
.tolink:hover{color:rgba(50,45,40,.85)}

/* === 描画 === */
.draw{
  fill:none;
  stroke-dasharray:var(--len,800);
  stroke-dashoffset:var(--len,800);
  animation:drawIn 1.6s ease forwards;
}
@keyframes drawIn{to{stroke-dashoffset:0}}
.fadein{opacity:0;animation:fadeIn 1.2s ease forwards}
@keyframes fadeIn{to{opacity:1}}

/* 等高線 */
.contour{stroke:rgba(120,95,60,.45);stroke-width:.7;fill:none}
.contour-major{stroke:rgba(120,95,60,.7);stroke-width:1.1;fill:none}

/* 等高線描画タイミング（外側→内側、薄→濃） */
.c1{animation-delay:.2s}.c2{animation-delay:.5s}.c3{animation-delay:.8s}
.c4{animation-delay:1.1s}.c5{animation-delay:1.4s}.c6{animation-delay:1.7s}
.c7{animation-delay:2.0s}

/* 敷地境界 */
.site{stroke:rgba(180,40,40,.7);stroke-width:1.2;stroke-dasharray:6 4;fill:none}

/* 建築の立ち上がり（下から） */
@keyframes riseUp{
  0%{transform:translateY(40px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
#building{
  transform-origin:center bottom;transform-box:fill-box;
  animation:riseUp 1.6s cubic-bezier(.25,.7,.3,1) forwards;
  animation-delay:4.0s;opacity:0;
}

/* 敷地ラベル */
.site-label{
  font-family:'Share Tech Mono',monospace;font-size:7px;
  fill:rgba(180,40,40,.7);letter-spacing:.05em;opacity:0;
  animation:fadeIn 1s ease forwards;
}
.contour-label{
  font-family:'Share Tech Mono',monospace;font-size:6.5px;
  fill:rgba(120,95,60,.6);letter-spacing:.05em;opacity:0;
  animation:fadeIn 1s ease forwards;
}

/* フェーズキャプション */
.phase-label{
  font-family:'Montserrat',sans-serif;font-size:13px;letter-spacing:.35em;
  fill:rgba(50,45,40,.55);text-anchor:middle;opacity:0;
  animation:phasePulse 2.6s ease forwards;
}
@keyframes phasePulse{
  0%{opacity:0;transform:translateY(8px)}
  15%{opacity:.85;transform:translateY(0)}
  85%{opacity:.85}
  100%{opacity:0}
}
.lbl1{animation-delay:.2s}
.lbl2{animation-delay:2.6s}
.lbl3{animation-delay:5.0s}

/* コンパス */
@keyframes compassRotate{
  0%{transform:rotate(-30deg);opacity:0}
  100%{transform:rotate(0deg);opacity:1}
}
#compass{
  transform-origin:50% 50%;transform-box:fill-box;
  animation:compassRotate 2s ease forwards;
  animation-delay:.4s;opacity:0;
}
</style>
</head>
<body>

<div class="title">⑤ FROM THE LAND</div>
<div class="desc">等高線 → 敷地 → 建築。土地の声から始まる設計。</div>

<div class="svgwrap" onclick="replay()">
<svg id="svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid meet">

  <!-- フェーズ -->
  <text class="phase-label lbl1" x="400" y="32">CONTOUR</text>
  <text class="phase-label lbl2" x="400" y="32">SITE BOUNDARY</text>
  <text class="phase-label lbl3" x="400" y="32">BUILDING</text>

  <!-- ===== 等高線（外側→内側、有機的な閉曲線） ===== -->
  <path class="contour draw c1" style="--len:1500"
        d="M 60 350 C 100 320, 160 280, 250 270 S 460 220, 560 230 S 720 280, 760 330 S 720 400, 600 410 S 300 430, 160 410 S 80 380, 60 350 Z"/>
  <path class="contour draw c2" style="--len:1300"
        d="M 110 340 C 140 310, 200 285, 280 280 S 460 240, 540 250 S 680 290, 700 330 S 660 380, 560 390 S 320 410, 200 390 S 120 365, 110 340 Z"/>
  <path class="contour-major draw c3" style="--len:1100"
        d="M 160 335 C 190 305, 240 285, 310 285 S 450 255, 520 265 S 640 295, 660 330 S 620 365, 540 375 S 340 390, 240 375 S 170 355, 160 335 Z"/>
  <path class="contour draw c4" style="--len:900"
        d="M 220 330 C 245 305, 285 290, 340 290 S 440 270, 500 275 S 600 295, 615 325 S 580 355, 520 360 S 360 372, 280 362 S 230 348, 220 330 Z"/>
  <path class="contour-major draw c5" style="--len:700"
        d="M 280 325 C 300 305, 330 295, 370 295 S 430 285, 470 290 S 555 305, 565 325 S 540 345, 500 350 S 380 355, 320 350 S 285 340, 280 325 Z"/>
  <path class="contour draw c6" style="--len:520"
        d="M 330 322 C 345 308, 365 300, 390 300 S 440 295, 460 305 S 510 318, 515 325 S 495 338, 470 340 S 400 345, 360 340 S 335 332, 330 322 Z"/>
  <path class="contour draw c7" style="--len:380"
        d="M 365 320 C 375 310, 390 305, 410 305 S 440 308, 455 315 S 470 322, 470 326 S 450 332, 430 332 S 390 333, 375 330 S 365 325, 365 320 Z"/>

  <!-- 等高線レベル表示 -->
  <text class="contour-label" x="62" y="345" style="animation-delay:1.6s">+12.0</text>
  <text class="contour-label" x="125" y="335" style="animation-delay:1.6s">+11.5</text>
  <text class="contour-label" x="172" y="330" style="animation-delay:1.6s">+11.0</text>
  <text class="contour-label" x="290" y="320" style="animation-delay:1.6s">+10.5</text>
  <text class="contour-label" x="375" y="316" style="animation-delay:1.6s">+10.0</text>

  <!-- ===== 敷地境界（破線・赤系） ===== -->
  <polygon class="site draw c1" style="--len:1100;animation-delay:2.8s"
           points="280,250 520,250 540,400 270,400"/>

  <!-- 敷地ラベル -->
  <text class="site-label" x="290" y="244" style="animation-delay:3.6s">SITE BOUNDARY</text>
  <text class="site-label" x="290" y="395" style="animation-delay:3.6s">N=520.4 m²</text>
  <!-- 敷地寸法 -->
  <text class="site-label" x="400" y="244" text-anchor="middle" style="animation-delay:3.6s">22,400</text>
  <text class="site-label" x="540" y="325" style="animation-delay:3.6s;writing-mode:tb">14,000</text>

  <!-- ===== コンパス ===== -->
  <g id="compass" transform="translate(680,90)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(50,45,40,.5)" stroke-width=".7"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="rgba(50,45,40,.5)" stroke-width=".5"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="rgba(50,45,40,.5)" stroke-width=".5"/>
    <polygon points="0,-22 -4,-12 4,-12" fill="rgba(50,45,40,.7)"/>
    <text x="0" y="-26" text-anchor="middle" style="font-size:8px;fill:rgba(50,45,40,.7)">N</text>
  </g>

  <!-- ===== 建築（敷地中央に立ち上がる、フラット屋根オフィスビル） ===== -->
  <g id="building">
    <!-- 影 -->
    <ellipse cx="410" cy="395" rx="80" ry="6" fill="rgba(50,45,40,.18)"/>
    <!-- パラペット（屋根上の縁取り） -->
    <rect x="343" y="252" width="134" height="6" fill="rgba(50,45,40,.85)"/>
    <!-- 本体（フラット屋根の箱型、4階建て） -->
    <rect x="345" y="258" width="130" height="134" fill="rgba(50,45,40,.92)"/>
    <!-- 床ライン（薄い水平線、シルエット中） -->
    <line x1="345" y1="291" x2="475" y2="291" stroke="rgba(245,243,240,.1)" stroke-width=".4"/>
    <line x1="345" y1="324" x2="475" y2="324" stroke="rgba(245,243,240,.1)" stroke-width=".4"/>
    <line x1="345" y1="357" x2="475" y2="357" stroke="rgba(245,243,240,.1)" stroke-width=".4"/>
    <!-- 窓: 各階1本のストリップ窓（3階分 + エントランス階） -->
    <rect x="352" y="265" width="116" height="22" fill="rgba(255,228,160,.85)"/>
    <rect x="352" y="298" width="116" height="22" fill="rgba(255,228,160,.85)"/>
    <rect x="352" y="331" width="116" height="22" fill="rgba(255,228,160,.85)"/>
    <!-- F1 (ground): エントランス -->
    <rect x="352" y="364" width="116" height="28" fill="rgba(180,200,210,.45)"/>
    <line x1="410" y1="364" x2="410" y2="392" stroke="rgba(245,243,240,.45)" stroke-width=".5"/>
    <!-- キャノピー -->
    <line x1="395" y1="361" x2="425" y2="361" stroke="rgba(245,243,240,.5)" stroke-width="1"/>
  </g>

  <!-- 建築の高さ寸法（建物登場後） -->
  <line x1="500" y1="252" x2="500" y2="392" stroke="rgba(50,45,40,.4)" stroke-width=".5"
        class="fadein" style="animation-delay:5.6s"/>
  <text x="510" y="328" style="font-size:7.5px;fill:rgba(50,45,40,.6);letter-spacing:.05em"
        class="fadein" style="animation-delay:5.6s">H=12,500</text>

  <!-- ===== タイトル ===== -->
  <text x="60" y="60" style="font-family:'Shippori Mincho B1',serif;font-size:11px;letter-spacing:.3em;fill:rgba(50,45,40,.5)"
        class="fadein" style="animation-delay:5.4s">敷地読みから始まる</text>
  <text x="60" y="78" style="font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:.25em;fill:rgba(50,45,40,.4)"
        class="fadein" style="animation-delay:5.6s">— READING THE TERRAIN —</text>

  <!-- 武田菱 -->
  <g transform="translate(720,440)" fill="rgba(50,45,40,.7)" class="fadein" style="animation-delay:6.0s">
    <polygon points="0,-8 6,-4 0,0 -6,-4"/>
    <polygon points="0,1 6,5 0,9 -6,5"/>
    <polygon points="-1,0 -7,-4 -13,0 -7,4"/>
    <polygon points="1,0 7,-4 13,0 7,4"/>
  </g>
  <text x="700" y="465" style="font-size:7px;fill:rgba(50,45,40,.6);letter-spacing:.3em;font-family:'Shippori Mincho B1',serif"
        class="fadein" style="animation-delay:6.2s">TAKEDA</text>
</svg>
</div>

<button class="replay" onclick="replay()">↻ REPLAY</button>
<a href="mockup_entrance_variants.html" class="tolink">← BACK TO INDEX</a>

<script>
function replay(){
  const svg=document.getElementById('svg');
  const clone=svg.cloneNode(true);
  svg.parentNode.replaceChild(clone,svg);
}
</script>
</body>
</html>
