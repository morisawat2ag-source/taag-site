<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400;500&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f3f0;font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;height:100vh;overflow:hidden;position:relative;}
.grid-bg{display:none;}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:.9}100%{transform:translateY(660px) rotate(360deg);opacity:0}}
.petal{position:fixed;pointer-events:none;top:-12px;border-radius:50% 50% 50% 0;animation:fall linear infinite;}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:.75}}
.hint{animation:blink 2.2s ease-in-out infinite}
/* 図面描画アニメーション */
.draw{stroke-dasharray:1200;stroke-dashoffset:1200;animation:drawIn 2s ease forwards}
@keyframes drawIn{to{stroke-dashoffset:0}}
.draw-d1{animation-delay:.1s}
.draw-d2{animation-delay:.3s}
.draw-d3{animation-delay:.6s}
.draw-d4{animation-delay:.9s}
.draw-d5{animation-delay:1.2s}
.svg-fade{opacity:0;animation:svgFadeIn .8s ease forwards}
.svg-fade-d2{animation-delay:1.6s}
.svg-fade-d3{animation-delay:2s}
@keyframes svgFadeIn{to{opacity:1}}
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity 1.4s ease-in;z-index:200}
.flash.on{opacity:1}
.flash.slow-out{transition:opacity 2s ease-out}
.top-page{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity 1.2s;z-index:100;background:#808080}
.top-page.show{opacity:1;pointer-events:all}
.top-page .bg-img{width:100%;height:100%;object-fit:contain;filter:brightness(0.8)}
.top-page .overlay-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(8,7,5,.7)100%)}
.top-page .top-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:40px 48px}
.top-page .top-header{display:flex;justify-content:space-between;align-items:flex-start}
.top-page .top-logo{font-family:'Shippori Mincho B1',serif;font-size:24px;font-weight:600;letter-spacing:.15em;color:rgba(255,250,240,.95);opacity:0;transform:translateY(10px);transition:all .6s .3s}
.top-page .top-logo-sub{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:300;letter-spacing:.25em;color:rgba(255,250,240,.5);margin-top:6px;opacity:0;transition:all .6s .4s}
.top-page.show .top-logo,.top-page.show .top-logo-sub,.top-page.show .top-nav,.top-page.show .back-btn{opacity:1;transform:translateY(0)}
.top-page .top-nav{display:flex;gap:32px;align-items:center;opacity:0;transform:translateY(10px);transition:all .6s .5s}
.top-page .top-nav a{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:400;letter-spacing:.28em;color:rgba(255,250,240,.75);text-decoration:none;transition:color .2s;position:relative}
.top-page .top-nav a:hover{color:rgba(255,250,240,1)}
.top-page .top-nav a .nav-jp{position:absolute;left:50%;top:calc(100% + 12px);transform:translateX(-50%);white-space:nowrap;font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:400;letter-spacing:.08em;color:rgba(255,250,240,.85);background:rgba(40,38,35,.85);padding:6px 14px;border-radius:6px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;transform:translateX(-50%) translateY(-4px)}
.top-page .top-nav a .nav-jp::before{content:'';position:absolute;left:50%;top:-5px;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:5px solid rgba(40,38,35,.85)}
.top-page .top-nav a:hover .nav-jp{opacity:1;transform:translateX(-50%) translateY(0)}
.top-page .top-footer{display:flex;justify-content:space-between;align-items:flex-end}
.top-page .top-tagline{position:fixed;left:48px;bottom:80px;font-family:'MS Gothic','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:57px;font-weight:300;font-style:italic;letter-spacing:.06em;color:rgba(255,250,240,.92);line-height:1.4}
@keyframes slideInBounce{
  0%{transform:translateX(100vw);opacity:0}
  5%{opacity:1}
  70%{transform:translateX(-18px);opacity:1}
  82%{transform:translateX(8px);opacity:1}
  92%{transform:translateX(-3px);opacity:1}
  100%{transform:translateX(0);opacity:1}
}
.top-page .tag-line{display:block;opacity:0;transform:translateX(100vw)}
.top-page.show .tag-line{animation:slideInBounce 1.8s ease-out forwards}
.top-page.show .tag-line:nth-child(1){animation-delay:.5s}
.top-page.show .tag-line:nth-child(2){animation-delay:.85s}
.top-page.show .tag-line:nth-child(3){animation-delay:1.2s}
.top-page .back-btn{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:300;letter-spacing:.22em;color:rgba(255,250,240,.4);background:none;border:none;cursor:pointer;opacity:0;transition:all .6s .7s}
.top-page .back-btn:hover{color:rgba(255,250,240,.9)}
</style>
<script>if(new URLSearchParams(location.search).has('top')){document.write('<style id="topDirect">#mainsvg,.grid-bg,#petals,.flash{display:none!important}.top-page{opacity:1!important;pointer-events:all!important}</style>')}</script>

function movePerson(ox){
  elPerson.setAttribute('transform', `translate(${ox},0)`);
}

// 歩行アニメ：各パーツをpathで書き換え
// 横から見た歩行：脚・腕をXオフセットで前後に振る
function drawWalkPose(ph){
  const ls = Math.sin(ph) * 12;      // 脚の振れ幅（X方向）
  const as = Math.sin(ph + Math.PI) * 9; // 腕の振れ幅（逆位相）

  // 前脚（太め・手前）
  const lfThighX = BX + ls;
  const lfKneeY = HIP_Y + 24;
  const lfFootX = lfThighX + ls * 0.12;
  elLegF.setAttribute('d',
    `M${BX},${HIP_Y} Q${lfThighX},${lfKneeY} ${lfFootX},${GY-2} L${lfFootX+6},${GY-2} Q${lfThighX+5},${lfKneeY} ${BX+4},${HIP_Y} Z`
  );
  elShoeF.setAttribute('d',
    `M${lfFootX-1},${GY-1} Q${lfFootX+5},${GY-3} ${lfFootX+9},${GY-1} Q${lfFootX+10},${GY+2} ${lfFootX+7},${GY+3} Q${lfFootX+2},${GY+3} ${lfFootX-1},${GY+1} Z`
  );

  // 後脚（細め・奥）
  const lbThighX = BX - ls;
  const lbKneeY = HIP_Y + 24;
  const lbFootX = lbThighX - ls * 0.12;
  elLegB.setAttribute('d',
    `M${BX-2},${HIP_Y} Q${lbThighX-2},${lbKneeY} ${lbFootX-4},${GY-2} L${lbFootX+2},${GY-2} Q${lbThighX+2},${lbKneeY} ${BX+2},${HIP_Y} Z`
  );
  elShoeB.setAttribute('d',
    `M${lbFootX-5},${GY-1} Q${lbFootX+1},${GY-3} ${lbFootX+4},${GY-1} Q${lbFootX+5},${GY+2} ${lbFootX+2},${GY+3} Q${lbFootX-4},${GY+3} ${lbFootX-6},${GY+1} Z`
  );

  // 前腕（手前・太め）
  const afElbX = BX + as;
  const afElbY = SHO_Y + 20;
  const afHandX = afElbX + as * 0.2;
  const afHandY = afElbY + 16;
  elArmF.setAttribute('d',
    `M${BX+3},${SHO_Y} Q${afElbX+2},${afElbY} ${afHandX+1},${afHandY}`
  );

  // 後腕（奥・細め）
  const abElbX = BX - as;
  const abElbY = SHO_Y + 20;
  const abHandX = abElbX - as * 0.2;
  const abHandY = abElbY + 16;
  elArmB.setAttribute('d',
    `M${BX-3},${SHO_Y} Q${abElbX-2},${abElbY} ${abHandX-1},${abHandY}`
  );

  // 上下の揺れ（重心移動）
  const bobY = Math.abs(Math.sin(ph * 2)) * 1.5;
  elPerson.setAttribute('transform', `translate(${offsetX},${bobY})`);
}

// 初期姿勢（ドアに近い位置からスタート）
const START_OFFSET=100;
offsetX=START_OFFSET;
drawWalkPose(0);

let animating=false, walking=false, lastTs=null, rafId=null, targetX=0, phase=0;

function walkLoop(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;
  if(walking){
    phase += dt * 5;
    offsetX += dt * 55;
    drawWalkPose(phase);
    if(offsetX >= targetX){
      offsetX=targetX; walking=false; phase=0;
      drawWalkPose(0);
      onReachDoor(); return;
    }
  }
  rafId=requestAnimationFrame(walkLoop);
}

function onReachDoor(){
  // まず扉を開く
  const d=document.getElementById('doorAnim');
  d.style.transition='transform 0.9s cubic-bezier(0.4,0,0.2,1)';
  d.style.transform='perspective(700px) rotateY(-78deg)';
  // ドアの光を表示
  document.getElementById('doorLight').style.opacity='1';
  // 扉が開いてから中に入る
  setTimeout(()=>{
    walking=true; targetX=offsetX+65; lastTs=null;
    rafId=requestAnimationFrame(walkLoopIn);
  },1000);
  // フラッシュ（入った後）
  setTimeout(()=>document.getElementById('flash').classList.add('on'),1900);
  setTimeout(()=>{
    const fl=document.getElementById('flash');
    document.getElementById('topPage').classList.add('show');
    fl.classList.add('slow-out');
    fl.classList.remove('on');
    setTimeout(()=>fl.classList.remove('slow-out'),2400);
  },3400);
}

function walkLoopIn(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;
  if(walking){
    phase+=dt*5; offsetX+=dt*48;
    drawWalkPose(phase);
    const progress=(offsetX-(targetX-65))/65;
    elPerson.style.opacity=Math.max(1-progress*1.5,0);
    if(offsetX>=targetX){walking=false;return;}
  }
  rafId=requestAnimationFrame(walkLoopIn);
}

function startAnim(){
  if(animating)return; animating=true;
  document.getElementById('walkArrow').style.opacity='0';
  targetX=248; walking=true; lastTs=null;
  rafId=requestAnimationFrame(walkLoop);
}

function skipToTop(){
  if(!animating) return;
  cancelAnimationFrame(rafId);
  walking=false;
  elPerson.style.opacity='0';
  document.getElementById('flash').classList.add('on');
  setTimeout(()=>{
    const fl=document.getElementById('flash');
    document.getElementById('topPage').classList.add('show');
    fl.classList.add('slow-out');
    fl.classList.remove('on');
    setTimeout(()=>fl.classList.remove('slow-out'),2400);
  },1500);
}

function goBack(){
  // ?top=1で来た場合の注入スタイルを解除
  const ds=document.getElementById('topDirect');
  if(ds) ds.remove();
  document.getElementById('mainsvg').style.display='';
  document.getElementById('flash').style.display='';

  document.getElementById('flash').classList.add('on');
  cancelAnimationFrame(rafId);
  setTimeout(()=>{
    document.getElementById('topPage').classList.remove('show');
    walking=false; offsetX=START_OFFSET; phase=0; lastTs=null;
    elPerson.style.opacity=1;
    drawWalkPose(0);
    const d=document.getElementById('doorAnim');
    d.style.transition='transform .6s';
    d.style.transform='perspective(700px) rotateY(0deg)';
    document.getElementById('doorLight').style.opacity='0';
    document.getElementById('walkArrow').style.opacity='1';
    setTimeout(()=>document.getElementById('flash').classList.remove('on'),200);
    animating=false;
    setTimeout(startAnim, 1000);
  },400);
}

// ページ読み込み時に自動で歩き始める
window.addEventListener('load', ()=>{
  if(new URLSearchParams(location.search).has('top')){
    document.getElementById('topPage').classList.add('show');
    document.getElementById('mainsvg').style.display='none';
  } else {
    setTimeout(startAnim, 3700);
  }
});
</script>
